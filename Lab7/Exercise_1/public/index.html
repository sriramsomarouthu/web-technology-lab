<!DOCTYPE html>
<html>
<head>
<title>Student Notes Manager</title>
<style>
    /* 1. Global Reset & Vibrant Background */
    body {
        font-family: 'Poppins', 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        background-attachment: fixed;
        color: #333;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
        margin: 0;
        min-height: 100vh;
        box-sizing: border-box;
    }

    /* 2. Glassmorphism Main Container */
    .app-container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        width: 100%;
        max-width: 550px;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* 3. Typography */
    h2 {
        text-align: center;
        color: #1e1e2f;
        font-size: 28px;
        margin-top: 0;
        margin-bottom: 30px;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: -webkit-linear-gradient(#667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    h3 {
        color: #4a4a68;
        font-size: 18px;
        margin-bottom: 15px;
        border-bottom: 2px solid #eee;
        padding-bottom: 8px;
    }

    /* 4. Beautiful Inputs */
    input[type="text"], textarea {
        width: 100%;
        padding: 14px 18px;
        margin-bottom: 18px;
        border: 2px solid #e1e1e1;
        border-radius: 12px;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 15px;
        background-color: #fafafa;
        transition: all 0.3s ease;
        outline: none;
    }

    input[type="text"]:focus, textarea:focus {
        border-color: #667eea;
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
    }

    textarea {
        resize: vertical;
        min-height: 120px;
    }

    /* 5. Gradient Button with Hover Animation */
    button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 20px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        width: 100%;
        letter-spacing: 1px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(118, 75, 162, 0.6);
    }

    button:active {
        transform: translateY(1px);
        box-shadow: 0 2px 10px rgba(118, 75, 162, 0.4);
    }

    /* 6. Note Cards Styling (For your JS integration) */
    #notes {
        margin-top: 25px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .note-card {
        background: #ffffff;
        border: 1px solid #eee;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .note-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 6px;
        height: 100%;
        background: linear-gradient(to bottom, #667eea, #764ba2);
    }

    .note-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .note-card h4 {
        margin: 0 0 8px 0;
        color: #1e1e2f;
        font-size: 20px;
    }

    .note-subject {
        display: inline-block;
        font-size: 11px;
        background: #f0f0f5;
        color: #764ba2;
        padding: 4px 10px;
        border-radius: 20px;
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 12px;
        letter-spacing: 0.5px;
    }

    .note-card p {
        margin: 0;
        font-size: 14.5px;
        color: #666;
        line-height: 1.6;
    }
</style>
</head>

<body>

<div class="app-container">
    <h2>Student Notes</h2>

    <h3>Add a New Note</h3>
    <input type="text" id="title" placeholder="Enter Note Title...">
    <input type="text" id="subject" placeholder="Enter Subject (e.g., Math, History)...">
    <textarea id="description" placeholder="Write your notes here..."></textarea>
    
    <button onclick="addNote()">Save Note</button>

    <h3>Your Saved Notes</h3>
    <div id="notes">
        <div class="note-card">
            <h4>Sample Exam Note</h4>
            <span class="note-subject">Computer Science</span>
            <p>Remember to study the differences between relational and non-relational databases for the final exam. Review the MongoDB lab sheet.</p>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
